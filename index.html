<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Отзывы</title>

<style>

body{
font-family: Arial;
background:#f4f6fb;
padding:30px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
margin-top:15px;
background:#4CAF50;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

.review{
background:#f9f9f9;
padding:15px;
margin-top:15px;
border-radius:8px;
}

.stars{
color:gold;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<h2>⭐ Отзывы посетителей</h2>

<input id="name" placeholder="Ваше имя">

<textarea id="review" placeholder="Напишите отзыв"></textarea>

<select id="rating">
<option>⭐</option>
<option>⭐⭐</option>
<option>⭐⭐⭐</option>
<option>⭐⭐⭐⭐</option>
<option>⭐⭐⭐⭐⭐</option>
</select>

<button onclick="addReview()">Отправить отзыв</button>

<div id="reviews"></div>

</div>

<script>

function addReview(){

let name=document.getElementById("name").value
let review=document.getElementById("review").value
let rating=document.getElementById("rating").value

let block=`
<div class="review">
<b>${name}</b>
<div class="stars">${rating}</div>
<p>${review}</p>
</div>
`

document.getElementById("reviews").innerHTML+=block

}

</script>

</body>
</html>
