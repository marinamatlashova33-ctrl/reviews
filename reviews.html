<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<style>
body{
font-family: Arial, sans-serif;
background:#f5f7fb;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

.review{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.name{
font-weight:bold;
}

.stars{
color:#f5b301;
}
</style>

</head>

<body>

<div class="container">

<div class="review">
<div class="name">Анна</div>
<div class="stars">★★★★★</div>
<div>Очень полезный сайт!</div>
</div>

<div class="review">
<div class="name">Игорь</div>
<div class="stars">★★★★☆</div>
<div>Спасибо за материалы.</div>
</div>

<div class="review">
<div class="name">Мария</div>
<div class="stars">★★★★★</div>
<div>Отличная информация для обучения.</div>
</div>

</div>

</body>
</html>
